[project]
name = "hanbridge-api"
version = "0.1.0"
description = "HanBridge REST API — HSK learning & exam-prep platform"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0,<0.116.0",
    "uvicorn[standard]>=0.30.0,<0.31.0",
    "sqlalchemy>=2.0.30,<2.1.0",
    "alembic>=1.13.0,<1.14.0",
    "psycopg[binary]>=3.2.0,<3.3.0",
    "pydantic>=2.8.0,<3.0.0",
    "pydantic-settings>=2.4.0,<3.0.0",
    "redis>=5.0.0,<6.0.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.6.0,<0.7.0",
    "mypy>=1.11.0,<1.12.0",
    "pytest>=8.3.0,<9.0.0",
    "httpx>=0.27.0,<0.28.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# B008: FastAPI intentionally uses Depends()/Query() as argument defaults.
ignore = ["B008"]

[tool.ruff.lint.per-file-ignores]
# Auto-generated migrations: don't enforce line length / import order.
"alembic/versions/*" = ["E501"]

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]
ignore_missing_imports = true
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
