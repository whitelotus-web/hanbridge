services:
  db:
    image: postgres:16-alpine
    container_name: hanbridge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hanbridge
      POSTGRES_PASSWORD: hanbridge
      POSTGRES_DB: hanbridge
    ports:
      - "5432:5432"
    volumes:
      - hanbridge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanbridge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hanbridge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - hanbridge_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hanbridge_pgdata:
  hanbridge_redisdata:
